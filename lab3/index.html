<!DOCTYPE html>
<html>

<head>
    <title> Sign Up Page </title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="text-center">
    <main>
        <h1> Sign Up </h1>
        First Name:<input type="text" name="fName"><br>
        Last Name: <input type="text" name="lName"><br>
        Gender:
        <input type="radio" name="gender" value="m">Male
        <input type="radio" name="gender" value="f">Female<br><br>
        Zip Code: <input type="text" id="zip" name="zip"><br>
        City: <span id="city"></span> <br>
        Latitude: <span id="latitude"></span><br>
        Longitude: <span id="longitude"></span><br><br>

        State:
        <select id="state" name="state">
            <option>Select One</option>
            <option value="ca">California</option>
            <option value="ny">New York</option>
            <option value="tx">Texas</option>
        </select> <br>


        Select a County: <select id="county" disabled> <option> Select County </option> </select><br><br>


        Desired Username:
        <input type="text" id="username"><br>


        Password: <input type="password">
        <span id=”suggestedPwd”></span> <br>
        Type Password Again: <input type="password"><br>

        <span id=”passwordError”></span>

        <input type="submit" value="Sign up!">
    </main>

    <footer>
        <hr>
        <br>
        CST336 Internet Programming. 2026&copy; Lizarraga <br>
        <strong>Disclaimer:</strong> This webpage is for academic purposes only. <br><br>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>

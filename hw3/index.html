<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW3</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">

    <!-- using https://www.omdbapi.com/  with a free key-->
</head>

<body>

    <h1>OMDb Media Finder</h1>
    <main>

        <div id="container">
        <form id="searchForm">

            Title: <input type="text" id="qtitle" name="t"><br>
            Release Year (optional): <input type="text" id="qyear" name="y"><br>

            Type:
            <input type="radio" name="type" value="" checked="true"> Any
            <input type="radio" name="type" value="movie"> Movie
            <input type="radio" name="type" value="series"> Series
            <input type="radio" name="type" value="episode"> Episode
            <br>
            <br>



            <button type="submit"> Search </button>
            <button type="button" id="resetBtn"> Reset </button>

        </form>


        <div id="results">
            
            <span id="rTitle" hidden="true"></span> <br>
            <span id="rYear" hidden="true"></span> <br>
            <span id="rType" hidden="true"></span> <br>
            <span id="errorMsg"></span> <br>
            <span id="rPoster"></span> <br>

            <button id="previous" hidden="true" disabled="true"> < </button>
            <button id="next" hidden="true"> > </button>
            <span id="rAmount"></span>
            <br><br>
            <div id="disclaimer" hidden="true">Results provided via https://www.omdbapi.com/</div>
        </div>

        </div>
    </main>

    <br>

</body>

</html>
